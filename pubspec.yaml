name: flutter_permission_wizard
description: "Declarative, state-machine-driven permission flow wizard for Flutter. Builds on permission_handler to provide a complete, themeable UX for rationale, denial, restricted, and Settings-return flows."
version: 0.1.1
repository: https://github.com/example/flutter_permission_wizard
issue_tracker: https://github.com/example/flutter_permission_wizard/issues
topics:
  - permissions
  - permission-handler
  - ui
  - wizard

environment:
  sdk: ^3.11.0
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  permission_handler: ^11.3.0
  app_settings: ^5.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.0

flutter:
